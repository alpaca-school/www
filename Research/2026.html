<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>てぃあんだぁクラブ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #fdfefb;
  --txt:     #5a524c;
  --txt-m:   #8c8b85;
  --acc:     rgb(185,208,139);
  --acc-d:   rgb(120,158,72);
  --acc-dd:  rgb(80,115,40);
  --hi:      #f2e6b6;
  --info:    #f7faf4;
  --white:   #ffffff;
  --sh:      0 4px 12px rgba(0,0,0,0.08);
  --r:       16px;
  --orange:  #ff9f43;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Zen Maru Gothic',sans-serif; color:var(--txt); background:var(--bg); font-size:14px; line-height:1.7; -webkit-text-size-adjust:100%; }

/* =============================================
   共通コンポーネント
   ============================================= */
.sec { padding:18px 16px 0; }
.sec-lbl { font-size:10px; letter-spacing:.12em; font-weight:700; color:var(--acc-d); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.sec-lbl::after { content:''; flex:1; height:2px; background:var(--acc); border-radius:1px; }

.card { background:var(--white); border-radius:var(--r); padding:13px 15px; margin-bottom:9px; box-shadow:var(--sh); cursor:pointer; transition:transform .15s, box-shadow .15s; }
.card:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,0.12); }
.card:active { transform:scale(.98); }
.card-row { display:flex; align-items:center; gap:11px; }
.ci { width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.ci.g { background:rgba(185,208,139,.2); }
.ci.y { background:rgba(242,230,182,.5); }
.ci.o { background:rgba(255,159,67,.15); }
.ci.s { background:var(--info); }
.card-info { flex:1; min-width:0; }
.card-title { font-size:13px; font-weight:700; color:var(--txt); margin-bottom:2px; }
.card-sub { font-size:11px; color:var(--txt-m); line-height:1.5; }
.card-arr { font-size:16px; color:var(--acc); flex-shrink:0; }

.ev-card { background:linear-gradient(135deg,var(--acc),var(--acc-d)); border-radius:var(--r); padding:15px; margin-bottom:9px; color:#fff; cursor:pointer; transition:transform .15s; }
.ev-card:hover { transform:translateY(-2px); }
.ev-card:active { transform:scale(.98); }
.ev-badge { font-size:10px; background:rgba(255,255,255,.22); display:inline-block; padding:2px 8px; border-radius:10px; margin-bottom:7px; }
.ev-card h3 { font-size:15px; font-weight:700; margin-bottom:6px; }
.ev-meta { display:flex; gap:10px; flex-wrap:wrap; }
.ev-meta span { font-size:11px; opacity:.88; }
.ev-btn { margin-top:11px; background:rgba(255,255,255,.22); border:1px solid rgba(255,255,255,.38); color:#fff; font-size:12px; font-weight:700; padding:7px 16px; border-radius:20px; cursor:pointer; display:inline-block; font-family:'Zen Maru Gothic',sans-serif; }

.svc-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
.svc-card { background:var(--white); border-radius:var(--r); box-shadow:var(--sh); padding:14px 10px; cursor:pointer; transition:transform .15s, box-shadow .15s; text-align:center; border-top:4px solid var(--acc); }
.svc-card:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,0.12); }
.svc-card:active { transform:scale(.97); }
.svc-icon { font-size:26px; margin-bottom:5px; display:block; }
.svc-title { font-size:12px; font-weight:700; color:var(--acc-dd); line-height:1.4; }
.svc-sub { font-size:10px; color:var(--txt-m); margin-top:2px; }

.intro-box { margin:14px 16px 0; background:var(--info); border:1px solid var(--acc); border-radius:var(--r); padding:14px 16px; box-shadow:var(--sh); }
.intro-box p { font-size:13px; line-height:1.85; }
.intro-box strong { color:var(--acc-dd); }

.hero { position:relative; overflow:hidden; }
.hero-img-wrap { height:200px; background:var(--acc-d); }
.hero-img { width:100%; height:100%; object-fit:cover; object-position:center 20%; display:block; filter:brightness(.72); }
.hero-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(80,115,40,.88) 0%,rgba(80,115,40,.3) 55%,transparent 100%); display:flex; flex-direction:column; justify-content:flex-end; padding:18px; }
.hero-overlay h2 { font-size:21px; font-weight:700; color:#fff; line-height:1.5; margin-bottom:5px; }
.hero-overlay h2 em { font-style:normal; color:var(--hi); }
.hero-overlay p { font-size:11px; color:rgba(255,255,255,.75); line-height:1.8; }

.rel-sites { display:flex; flex-direction:column; gap:8px; }
.rel-a { display:flex; align-items:center; gap:10px; background:var(--white); border:1px solid #ddd; border-radius:12px; padding:11px 13px; text-decoration:none; transition:transform .15s; }
.rel-a:hover { transform:translateY(-1px); }
.rel-ico { font-size:20px; width:34px; text-align:center; flex-shrink:0; }
.rel-info { flex:1; min-width:0; }
.rel-title { font-size:13px; font-weight:700; color:var(--acc-dd); }
.rel-sub { font-size:10px; color:var(--txt-m); }
.rel-arr { font-size:14px; color:#ccc; }

/* 安心タブ */
.ansin-hero { background:linear-gradient(160deg,var(--acc-dd),var(--acc-d)); padding:22px 18px 26px; text-align:center; position:relative; overflow:hidden; }
.ansin-hero::before { content:'🤲'; position:absolute; right:10px; bottom:-8px; font-size:78px; opacity:.1; pointer-events:none; }
.ansin-hero h2 { font-size:19px; font-weight:700; color:#fff; margin-bottom:5px; }
.ansin-hero p { font-size:11px; color:rgba(255,255,255,.72); line-height:1.8; }

.stamp-wrap { margin:14px 16px 0; background:var(--white); border-radius:var(--r); padding:15px; box-shadow:var(--sh); border-top:4px solid var(--acc); }
.stamp-ttl { font-size:12px; font-weight:700; color:var(--txt); margin-bottom:3px; }
.stamp-sub { font-size:11px; color:var(--txt-m); margin-bottom:11px; }
.stamps { display:flex; flex-direction:column; gap:7px; }
.sbtn { display:flex; align-items:center; gap:9px; padding:10px 12px; border-radius:11px; border:1.5px solid #e8ede0; background:var(--info); cursor:pointer; transition:all .18s; font-family:'Zen Maru Gothic',sans-serif; font-size:12px; color:var(--txt); text-align:left; }
.sbtn .si { font-size:17px; }
.sbtn.sel { background:rgba(185,208,139,.25); border-color:var(--acc-d); color:var(--acc-dd); font-weight:700; }
.stamp-ok { margin-top:11px; background:var(--acc); color:#fff; border:none; width:100%; padding:12px; border-radius:11px; font-size:13px; font-weight:700; cursor:pointer; font-family:'Zen Maru Gothic',sans-serif; display:none; }

.memo-wrap { margin:11px 16px 0; background:var(--white); border-radius:var(--r); padding:15px; box-shadow:var(--sh); }
.memo-ttl { font-size:12px; font-weight:700; margin-bottom:3px; }
.memo-note { font-size:10px; color:var(--txt-m); line-height:1.7; margin-bottom:9px; }
.memo-note em { font-style:normal; background:rgba(242,230,182,.7); color:var(--acc-dd); padding:1px 4px; border-radius:3px; font-weight:700; }
textarea { width:100%; min-height:84px; background:var(--info); border:1.5px solid #e0e8d0; border-radius:10px; padding:10px 12px; font-family:'Zen Maru Gothic',sans-serif; font-size:13px; color:var(--txt); resize:none; outline:none; transition:border-color .2s; line-height:1.7; }
textarea:focus { border-color:var(--acc-d); }
textarea::placeholder { color:var(--txt-m); }

.contact-btns { margin:10px 16px 0; display:flex; gap:8px; }
.cbtn { flex:1; padding:12px 5px; border-radius:12px; border:none; font-family:'Zen Maru Gothic',sans-serif; font-size:12px; font-weight:700; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; text-decoration:none; transition:opacity .15s; }
.cbtn:hover { opacity:.88; }
.cbtn .cico { font-size:21px; }
.cbtn.tel { background:var(--orange); color:#fff; }
.cbtn.form { background:var(--acc); color:#fff; }
.cbtn.merumaga { background:var(--info); color:var(--acc-dd); border:1.5px solid var(--acc); }

.faq-wrap { background:var(--white); border-radius:var(--r); padding:15px; box-shadow:var(--sh); }
.faq-item { margin-bottom:14px; border-bottom:1px solid #eee; padding-bottom:12px; }
.faq-item:last-child { margin-bottom:0; border-bottom:none; padding-bottom:0; }
.faq-q { font-weight:700; color:var(--acc-d); font-size:13px; display:block; margin-bottom:5px; }
.faq-a { font-size:12px; color:var(--txt-m); margin:0; line-height:1.75; }

/* つながるタブ */
.ev-list-hdr { background:linear-gradient(135deg,var(--acc-dd),var(--acc-d)); padding:18px 18px 22px; }
.ev-list-hdr h2 { font-size:19px; font-weight:700; color:#fff; margin-bottom:4px; }
.ev-list-hdr p { font-size:11px; color:rgba(255,255,255,.65); line-height:1.7; }
.ev-item { background:var(--white); border-radius:var(--r); padding:15px; margin-bottom:9px; box-shadow:var(--sh); border-top:4px solid var(--acc); }
.ev-item-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:7px; }
.ev-item-title { font-size:14px; font-weight:700; color:var(--acc-dd); line-height:1.4; }
.ev-tag { font-size:10px; font-weight:700; padding:3px 8px; border-radius:10px; flex-shrink:0; }
.ev-tag.r { background:rgba(185,208,139,.25); color:var(--acc-dd); }
.ev-tag.g { background:rgba(185,208,139,.18); color:var(--acc-d); }
.ev-tag.b { background:rgba(242,230,182,.6); color:#8a7a30; }
.ev-price { font-size:13px; font-weight:700; color:var(--acc-dd); margin-bottom:9px; }
.hl-box { background:var(--info); border-radius:10px; padding:10px 12px; margin-bottom:9px; font-size:12px; }
.apbtn { width:100%; padding:11px; background:var(--acc); color:#fff; border:none; border-radius:10px; font-family:'Zen Maru Gothic',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:opacity .15s; }
.apbtn:hover { opacity:.88; }
.apbtn.o { background:var(--orange); }
.apbtn.y { background:var(--acc-d); }
.enen-card { background:linear-gradient(135deg,var(--info),#fff); border:1.5px dashed var(--acc); border-radius:var(--r); padding:15px; margin-bottom:9px; text-align:center; }
.enen-ttl { font-size:14px; font-weight:700; color:var(--acc-dd); margin-bottom:6px; }
.enen-card p { font-size:11px; color:var(--txt-m); line-height:1.8; margin-bottom:11px; }
.enen-btn { background:var(--acc-d); color:#fff; border:none; border-radius:20px; padding:9px 22px; font-family:'Zen Maru Gothic',sans-serif; font-size:12px; font-weight:700; cursor:pointer; }

/* 学ぶタブ */
.manabu-hdr { background:linear-gradient(160deg,#3a4a28,var(--acc-dd)); padding:17px 18px 21px; }
.manabu-hdr h2 { font-size:19px; font-weight:700; color:#fff; margin-bottom:4px; }
.manabu-hdr p { font-size:11px; color:rgba(255,255,255,.6); }
.art-card { background:var(--white); border-radius:var(--r); padding:13px 15px; margin-bottom:9px; box-shadow:var(--sh); cursor:pointer; transition:transform .15s; }
.art-card:hover { transform:translateY(-2px); }
.art-row { display:flex; gap:11px; }
.art-thumb { width:54px; height:54px; border-radius:10px; background:var(--info); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:24px; }
.art-info { flex:1; min-width:0; }
.art-tag { font-size:10px; font-weight:700; color:var(--acc-d); margin-bottom:3px; display:block; }
.art-title { font-size:13px; font-weight:700; color:var(--txt); line-height:1.4; margin-bottom:3px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.art-date { font-size:10px; color:var(--txt-m); }
.sub-btn { display:flex; align-items:center; justify-content:space-between; background:var(--info); border:1.5px solid var(--acc); border-radius:var(--r); padding:13px 15px; margin-bottom:9px; cursor:pointer; text-decoration:none; transition:background .15s; }
.sub-btn:hover { background:#e8f0de; }
.sub-btn span { font-size:13px; font-weight:700; color:var(--acc-dd); }
.sub-btn .arr { font-size:14px; color:var(--acc); }

/* わたしの歩みタブ */
.ayumi-hdr { background:linear-gradient(160deg,#3a4a28,var(--acc-d)); padding:17px 18px 21px; }
.ayumi-hdr h2 { font-size:19px; font-weight:700; color:#fff; margin-bottom:4px; }
.ayumi-hdr p { font-size:11px; color:rgba(255,255,255,.6); line-height:1.7; }
.ayumi-empty { text-align:center; padding:28px 18px; }
.ayumi-empty .big { font-size:42px; margin-bottom:10px; }
.ayumi-empty p { font-size:12px; color:var(--txt-m); line-height:1.8; }
.log-item { background:var(--white); border-radius:12px; padding:12px 15px; margin-bottom:8px; box-shadow:var(--sh); display:flex; align-items:center; gap:11px; }
.log-ico { width:34px; height:34px; border-radius:9px; background:var(--info); display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
.log-text strong { font-size:12px; display:block; }
.log-text span { font-size:10px; color:var(--txt-m); }
.priv-note { background:var(--info); border:1px solid var(--acc); border-radius:12px; padding:11px 13px; margin:0 16px; }
.priv-note p { font-size:10px; color:var(--acc-dd); line-height:1.8; text-align:center; }

/* モーダル */
#mo { display:none; position:fixed; inset:0; background:rgba(58,74,40,.5); z-index:9999; align-items:flex-end; backdrop-filter:blur(2px); }
#mo.open { display:flex; animation:fi .2s ease; }
@keyframes fi { from{opacity:0} to{opacity:1} }
#md { background:var(--bg); border-radius:20px 20px 0 0; padding:18px 18px 32px; width:100%; max-height:82vh; overflow-y:auto; animation:su .27s ease; }
@keyframes su { from{transform:translateY(26px);opacity:0} to{transform:translateY(0);opacity:1} }
.md-handle { width:36px; height:4px; background:var(--acc); border-radius:2px; margin:0 auto 14px; }
.md-title { font-size:18px; font-weight:700; color:var(--acc-dd); margin-bottom:4px; }
.md-sub { font-size:12px; color:var(--txt-m); margin-bottom:13px; line-height:1.8; }
.md-body { font-size:13px; color:var(--txt); line-height:1.9; }
.md-body a { color:var(--acc-d); }
.md-body strong { color:var(--acc-dd); }
.md-close { width:100%; margin-top:16px; background:var(--acc); color:#fff; border:none; border-radius:12px; padding:13px; font-family:'Zen Maru Gothic',sans-serif; font-size:13px; font-weight:700; cursor:pointer; }

/* トースト */
#toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(14px); background:var(--acc-dd); color:#fff; padding:10px 20px; border-radius:20px; font-size:12px; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .25s,transform .25s; z-index:9998; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* アニメーション */
@keyframes fu { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* =============================================
   スマホレイアウト（~767px）
   ============================================= */
@media (max-width: 767px) {
  html, body { height:100%; overflow:hidden; }

  #sp-shell {
    max-width:390px; margin:0 auto;
    height:100dvh; display:flex; flex-direction:column;
    background:var(--bg); overflow:hidden;
  }

  /* スマホ トップバー */
  #sp-topbar {
    flex-shrink:0; background:var(--acc); padding:12px 16px 10px;
    display:flex; align-items:center; justify-content:space-between;
    position:relative; overflow:hidden; border-bottom:3px solid var(--acc-d);
  }
  #sp-topbar::after { content:'てぃあんだぁ'; position:absolute; right:-6px; top:0; font-size:38px; color:rgba(255,255,255,.18); pointer-events:none; white-space:nowrap; font-weight:700; }
  .tb-logo { display:flex; align-items:center; gap:10px; }
  .tb-logo-img { width:38px; height:38px; border-radius:50%; object-fit:cover; border:2px solid rgba(255,255,255,.6); flex-shrink:0; background:var(--acc-d); }
  .tb-left h1 { font-size:15px; font-weight:700; color:#fff; line-height:1.3; }
  .tb-left span { font-size:9px; color:rgba(255,255,255,.75); letter-spacing:.07em; display:block; margin-top:1px; }
  .tb-right { width:34px; height:34px; background:rgba(255,255,255,.22); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:17px; cursor:pointer; flex-shrink:0; }

  /* スマホ スクロールエリア */
  #sp-scroll { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
  #sp-scroll::-webkit-scrollbar { display:none; }

  /* スマホ 画面切替 */
  .sp-sc { display:none; padding-bottom:20px; animation:fu .25s ease; }
  .sp-sc.on { display:block; }

  /* スマホ ボトムナビ */
  #sp-bnav {
    flex-shrink:0; background:#fff; display:flex;
    padding-bottom:env(safe-area-inset-bottom,0px);
    border-top:2px solid var(--acc);
  }
  .bn { flex:1; padding:8px 2px 9px; text-align:center; cursor:pointer; color:var(--txt-m); font-size:9px; line-height:1.4; transition:color .18s; user-select:none; }
  .bn .bico { font-size:20px; display:block; margin-bottom:2px; transition:transform .18s; }
  .bn.on { color:var(--acc-d); }
  .bn.on .bico { transform:translateY(-2px); }

  /* PC要素を隠す */
  #pc-shell { display:none; }
}

/* =============================================
   PCレイアウト（768px以上）
   左220px固定サイドナビ + 右スクロールエリア
   ============================================= */
@media (min-width: 768px) {
  html, body { height:100%; overflow:hidden; background:#e8f0de; }

  /* スマホ要素を隠す */
  #sp-shell { display:none; }

  /* PCシェル：左右2カラム、フル高さ */
  #pc-shell {
    display:flex; flex-direction:row;
    width:100%; height:100vh;
    max-width:1100px; margin:0 auto;
    box-shadow:0 0 40px rgba(0,0,0,0.15);
    background:var(--bg);
  }

  /* PC サイドナビ */
  #pc-side {
    width:220px; flex-shrink:0;
    background:var(--acc-dd);
    display:flex; flex-direction:column;
    height:100vh; overflow-y:auto;
  }
  #pc-side::-webkit-scrollbar { display:none; }

  .pc-logo-wrap { display:flex; flex-direction:column; align-items:center; padding:24px 16px 20px; border-bottom:1px solid rgba(255,255,255,.15); margin-bottom:12px; }
  .pc-logo-img { width:72px; height:72px; border-radius:50%; object-fit:cover; border:3px solid rgba(255,255,255,.5); margin-bottom:10px; background:var(--acc-d); }
  .pc-logo-name { font-size:14px; font-weight:700; color:#fff; text-align:center; line-height:1.4; }
  .pc-logo-sub { font-size:10px; color:rgba(255,255,255,.55); margin-top:3px; text-align:center; }

  .pc-nav-item { display:flex; align-items:center; gap:12px; padding:12px 20px; cursor:pointer; color:rgba(255,255,255,.6); font-size:13px; font-weight:700; transition:all .18s; border-left:3px solid transparent; user-select:none; }
  .pc-nav-item .pico { font-size:18px; }
  .pc-nav-item:hover { background:rgba(255,255,255,.1); color:#fff; }
  .pc-nav-item.on { background:rgba(255,255,255,.15); color:#fff; border-left-color:var(--acc); }

  .pc-side-contact { margin-top:auto; padding:16px; border-top:1px solid rgba(255,255,255,.15); display:flex; flex-direction:column; gap:8px; }
  .pc-side-contact a { display:block; text-align:center; background:var(--orange); color:#fff; border-radius:10px; padding:9px 8px; font-size:12px; font-weight:700; text-decoration:none; transition:opacity .15s; }
  .pc-side-contact a:hover { opacity:.85; }
  .pc-side-contact a.sub { background:rgba(255,255,255,.15); color:#fff; }
  .pc-tel { text-align:center; font-size:10px; color:rgba(255,255,255,.55); }
  .pc-tel a { color:rgba(255,255,255,.85); font-weight:700; text-decoration:none; font-size:12px; display:block; margin-top:2px; }

  /* PC メインスクロールエリア */
  #pc-main {
    flex:1; min-width:0;
    height:100vh; overflow-y:auto;
    overflow-x:hidden;
  }
  #pc-main::-webkit-scrollbar { width:6px; }
  #pc-main::-webkit-scrollbar-track { background:var(--info); }
  #pc-main::-webkit-scrollbar-thumb { background:var(--acc); border-radius:3px; }

  /* PC トップバー（メインの上部） */
  #pc-topbar { background:var(--acc); padding:10px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid var(--acc-d); position:sticky; top:0; z-index:10; }
  .pt-title { font-size:14px; font-weight:700; color:#fff; }
  .pt-sub { font-size:11px; color:rgba(255,255,255,.7); }

const TABS = ['home','ansin','tsunagaru','manabu','ayumi'];
TABS.forEach(t => {

/* =============================================
   スマホ ナビ
   ============================================= */
function spGoTo(n) {
  TABS.forEach(t => {
    document.getElementById('sp-'+t).classList.toggle('on', t===n);
    document.getElementById('bn-'+t).classList.toggle('on', t===n);
  });
  document.getElementById('sp-scroll').scrollTop = 0;
}

/* =============================================
   PC スクロールナビ
   ============================================= */
function pcScrollTo(id) {
  const el = document.getElementById(id);
  if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
  document.querySelectorAll('.pc-nav-item').forEach(x => x.classList.remove('on'));
  // クリックした要素をon
  event.currentTarget.classList.add('on');
}

// スクロール位置でサイドナビをハイライト
const pcMain = document.getElementById('pc-main');
if(pcMain) {
  pcMain.addEventListener('scroll', () => {
    const scs = ['pc-home','pc-ansin','pc-tsunagaru','pc-manabu','pc-ayumi'];
    let active = scs[0];
    scs.forEach(id => {
      const el = document.getElementById(id);
      if(el && el.getBoundingClientRect().top <= 80) active = id;
    });
    const navItems = document.querySelectorAll('.pc-nav-item');
    navItems.forEach((item,i) => item.classList.toggle('on', i === scs.indexOf(active)));
  });
}

/* =============================================
   共通ナビ（コンテンツ内のonclick用）
   ============================================= */
function navigate(tab) {
  if(window.innerWidth >= 768) {
    pcScrollTo2('pc-'+tab);
  } else {
    spGoTo(tab);
  }
}
function pcScrollTo2(id) {
  const el = document.getElementById(id);
  if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

/* =============================================
   スタンプ・安心ログ
   ============================================= */
let sel = null;
function selStamp(b) {
  document.querySelectorAll('.sbtn').forEach(x => x.classList.remove('sel'));
  b.classList.add('sel');
  sel = b.textContent.trim();
  document.querySelectorAll('#stamp-ok').forEach(el => el.style.display='block');
}
function stampDone() {
  if(!sel) return;
  const log = JSON.parse(localStorage.getItem('tia_log')||'[]');
  log.unshift({text:sel, date:new Date().toLocaleDateString('ja-JP')});
  localStorage.setItem('tia_log', JSON.stringify(log.slice(0,30)));
  showToast('記録しました 🌿');
  document.querySelectorAll('.sbtn').forEach(x => x.classList.remove('sel'));
  document.querySelectorAll('#stamp-ok').forEach(el => el.style.display='none');
  sel = null;
  renderAyumi();
}
function renderAyumi() {
  const log = JSON.parse(localStorage.getItem('tia_log')||'[]');
  ['ayumi-log-sec','ayumi-empty-sec','ayumi-log-list'].forEach(id => {
    // 複数ある可能性があるので全部更新
  });
  document.querySelectorAll('#ayumi-log-sec').forEach(el => el.style.display = log.length ? 'block':'none');
  document.querySelectorAll('#ayumi-empty-sec').forEach(el => el.style.display = log.length ? 'none':'block');
  const html = log.map(l => `<div class="log-item"><div class="log-ico">${[...l.text][0]}</div><div class="log-text"><strong>${l.text.replace(/^./,'').trim()}</strong><span>${l.date}</span></div></div>`).join('');
  document.querySelectorAll('#ayumi-log-list').forEach(el => el.innerHTML = html);
}
